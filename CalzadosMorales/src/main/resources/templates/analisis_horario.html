<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Análisis Horario de Ventas | Calzados Morales</title>
    <link rel="stylesheet" th:href="@{/assets/vendors/mdi/css/materialdesignicons.min.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/css/vendor.bundle.base.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="shortcut icon" th:href="@{/assets/images/favicon.png}" />
    
    <style>
        /* CONTROLES SUPERIORES (Basado en image_008204.png y image_00e47e.png) */
        .dataTables_wrapper .row:first-child {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding: 0 5px;
        }

        /* "Mostrar" a la izquierda */
        .dataTables_length label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: #343a40;
            margin-bottom: 0;
        }

        .dataTables_length select {
            width: 70px !important;
            height: 35px !important;
            border: 1px solid #ebedf2;
            border-radius: 4px;
        }

        /* "Buscar" ESQUINADO A LA DERECHA */
        .dataTables_filter {
            text-align: right;
            display: flex;
            justify-content: flex-end;
        }

        .dataTables_filter label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            margin-bottom: 0;
        }

        .dataTables_filter input {
            width: 200px !important;
            height: 35px !important;
            border: 1px solid #ebedf2 !important;
            border-radius: 4px !important;
            padding: 5px 12px !important;
            outline: none;
        }

        /* PAGINACIÓN ESQUINADA Y MORADA (Basado en image_00dc1f.png y image_00822c.png) */
        .dataTables_wrapper .row:last-child {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 25px;
        }

        .pagination {
            justify-content: flex-end !important;
        }

        .pagination .page-item.active .page-link {
            background-color: #b66dff !important;
            border-color: #b66dff !important;
            color: white !important;
        }

        .pagination .page-link {
            color: #b66dff !important;
            background-color: #f2edf3;
            border: none;
            margin-left: 5px;
            border-radius: 4px !important;
            padding: 8px 14px;
            font-weight: 500;
        }

        /* ESTILOS DE LA TABLA */
        #tablaAnalisisHorario thead th {
            background-color: #f8f9fa;
            font-weight: 700;
            color: #3e4b5b;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        /* Badges de bloque horario (Similar al estilo de image_006bc0.png) */
        .bloque-badge {
            border-radius: 4px;
            padding: 6px 10px;
            font-weight: bold;
            font-size: 11px;
            color: white;
            display: inline-block;
        }
        .bg-manana { background-color: #ff9f43; }
        .bg-almuerzo { background-color: #1cc88a; } /* Verde como "DISPONIBLE" */
        .bg-tarde { background-color: #b66dff; }
        .bg-cierre { background-color: #ff6258; }

        .linea-visible { border-top: 1.5px solid #ebedf2; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container-scroller">
        <nav th:replace="~{fragmentos/navbar :: navbar}"></nav>
        
        <div class="container-fluid page-body-wrapper">
            <nav th:replace="~{fragmentos/sidebar :: sidebar}"></nav>

            <div class="main-panel">
                <div class="content-wrapper">
                    
                    <div class="page-header">
                        <h3 class="page-title">
                            <span class="page-title-icon bg-gradient-primary text-white me-2">
                                <i class="mdi mdi-chart-line"></i>
                            </span> Análisis Horario de Ventas
                        </h3>
                    </div>

                    <div class="row">
                        <div class="col-12 grid-margin stretch-card">
                            <div class="card shadow-sm border-0">
                                <div class="card-body">
                                    <h4 class="card-title">Rendimiento por Bloques y Horas</h4>
                                    <hr class="linea-visible">

                                    <div class="table-responsive">
                                        <table class="table table-hover" id="tablaAnalisisHorario" width="100%">
                                            <thead>
                                                <tr>
                                                    <th>Hora (24h)</th>
                                                    <th>Bloque Horario</th>
                                                    <th class="text-center">N° Ventas</th>
                                                    <th class="text-right">Monto Recaudado</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr th:each="a : ${listaAnalisis}">
                                                    <td class="font-weight-bold text-primary">
                                                        <i class="mdi mdi-clock-outline me-1"></i>
                                                        <span th:text="${a[0]} + ':00'"></span>
                                                    </td>
                                                    <td>
                                                        <span th:class="'bloque-badge ' + ${a[1] == 'Mañana Temprano' ? 'bg-manana' : 
                                                                        (a[1] == 'Hora Almuerzo' ? 'bg-almuerzo' : 
                                                                        (a[1] == 'Tarde/Noche' ? 'bg-tarde' : 'bg-cierre'))}"
                                                              th:text="${a[1]}">
                                                        </span>
                                                    </td>
                                                    <td class="text-center">
                                                        <span class="badge badge-outline-dark" th:text="${a[2]}">0</span>
                                                    </td>
                                                    <td class="text-right font-weight-bold text-dark">
                                                        S/ <span th:text="${#numbers.formatDecimal(a[3], 1, 'COMMA', 2, 'POINT')}">0.00</span>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div> 
                
                <footer class="footer">
                    <div class="d-sm-flex justify-content-center justify-content-sm-between">
                        <span class="text-muted">Copyright © 2026 Calzados Morales</span>
                    </div>
                </footer>
            </div> 
        </div> 
    </div> 

    <script th:src="@{/assets/vendors/js/vendor.bundle.base.js}"></script>
    <script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.21/js/dataTables.bootstrap4.min.js"></script>
    
    <script th:inline="none">
        $(document).ready(function() {
            $('#tablaAnalisisHorario').DataTable({
                // Esto garantiza que el Buscar y el Mostrar se alineen a los extremos
                "dom": '<"row"<"col-sm-6"l><"col-sm-6 text-right"f>>' +
                       '<"row"<"col-sm-12"tr>>' +
                       '<"row"<"col-sm-6"i><"col-sm-6"p>>',
                "language": {
                    "lengthMenu": "Mostrar _MENU_ registros",
                    "search": "Buscar:",
                    "info": "Página _PAGE_ de _PAGES_",
                    "paginate": { 
                        "next": "Siguiente", 
                        "previous": "Anterior" 
                    },
                    "emptyTable": "No hay datos para el análisis"
                },
                "order": [[ 0, "asc" ]],
                "pageLength": 12
            });
        });
    </script>
</body>
</html>
