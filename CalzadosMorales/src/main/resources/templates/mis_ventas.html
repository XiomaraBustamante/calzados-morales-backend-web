<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Ventas | Calzados Morales</title>
    <link rel="stylesheet" th:href="@{/assets/vendors/mdi/css/materialdesignicons.min.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/css/vendor.bundle.base.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" th:href="@{/assets/images/favicon.png}" />
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.21/css/dataTables.bootstrap4.min.css">
	
    
    <style>
        :root {
            --purple-primary: #b66dff;
            --border-color: #ebedf2;
        }

        /* 1. POSICIONAMIENTO DEL BUSCADOR A LA DERECHA Y SELECTOR A LA IZQUIERDA */
        .dataTables_wrapper .row:first-child {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px !important;
            padding: 0 5px;
        }

        .dataTables_filter {
            text-align: right !important;
            float: right !important;
        }

        .dataTables_length {
            float: left !important;
        }

        /* Estilo de los inputs y etiquetas */
        .dataTables_length label, .dataTables_filter label {
            font-weight: normal;
            color: #343a40;
            font-size: 0.875rem;
            margin: 0;
        }

        .dataTables_filter input {
            border: 1px solid #ebedf2 !important;
            border-radius: 4px !important;
            padding: 6px 12px !important;
            margin-left: 10px !important;
            width: 210px !important;
        }

        .dataTables_length select {
            border: 1px solid #ebedf2 !important;
            border-radius: 4px !important;
            padding: 4px 8px !important;
            margin: 0 10px !important;
        }

        /* 2. ESTILO DE LA PAGINACIÓN (MORADO VIBRANTE) */
        .dataTables_wrapper .dataTables_paginate {
            margin-top: 20px !important;
            display: flex;
            justify-content: flex-end;
        }

        .pagination {
            display: flex;
            gap: 2px;
            list-style: none;
        }

        .page-item .page-link {
            padding: 8px 16px !important;
            color: #b66dff !important;
            background-color: #f3f0ff !important;
            border: none !important;
            font-weight: 500;
            border-radius: 4px !important;
        }

        .page-item.active .page-link {
            background-color: #b66dff !important;
            color: white !important;
            font-weight: bold;
        }

        .page-item.disabled .page-link {
            background-color: #f8f9fa !important;
            opacity: 0.6;
        }

        /* 3. ESTILOS DE LA TABLA */
        #tablaVentasVendedor thead th {
            border-top: none;
            border-bottom: 1px solid #f2f2f2;
            color: #333;
            font-weight: 700;
            background-color: transparent;
        }

        #tablaVentasVendedor tbody tr td {
            vertical-align: middle;
            border-top: 1px solid #f2f2f2;
        }

        .badge-status {
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .bg-registrada { background-color: #e8fadf; color: #3cd139; }
        .bg-anulada { background-color: #ffe7e7; color: #fe7c96; }
        
        .linea-visible { border-top: 1px solid #ebedf2; margin: 1.5rem 0; }
        
    </style>
</head>
<body>
    <div class="container-scroller">
        <nav th:replace="~{fragmentos/navbar :: navbar}"></nav>
        <div class="container-fluid page-body-wrapper">
            <nav th:replace="~{fragmentos/sidebar :: sidebar}"></nav>
            <div class="main-panel">
                <div class="content-wrapper">
                    
                    <div class="d-sm-flex align-items-center justify-content-between mb-4">
                        <h3 class="page-title">
                            <span class="page-title-icon bg-gradient-primary text-white me-2">
                                <i class="mdi mdi-cash-register"></i>
                            </span> Mis Ventas Realizadas
                        </h3>
                        <div>
                            <a th:href="@{/ventas/nueva}" class="btn btn-gradient-primary btn-sm font-weight-bold">
                                + Nueva Venta
                            </a>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-12 grid-margin stretch-card">
                            <div class="card shadow-sm border-0">
                                <div class="card-body">
                                    <h4 class="card-title text-primary mb-0">Historial de Comprobantes</h4>
                                    <hr class="linea-visible">

                                    <div class="table-responsive">
                                        <table class="table table-hover" id="tablaVentasVendedor" width="100%">
                                            <thead>
                                                <tr>
                                                    <th>Fecha / Hora</th>
                                                    <th>Comprobante</th>
                                                    <th>Cliente</th>
                                                    <th class="text-end">Total</th>
                                                    <th class="text-center">Estado</th>
                                                    <th class="text-center">PDF</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr th:each="v : ${listaVentas}">
                                                    <td>
                                                        <span class="text-dark font-weight-bold" th:text="${#strings.arraySplit(v[1], ' ')[0]}"></span><br>
                                                        <small class="text-muted" th:text="${#strings.substringAfter(v[1], ' ')}"></small>
                                                    </td>
                                                    <td class="font-weight-bold text-dark" th:text="${v[2]}"></td>
                                                    <td class="text-muted" th:text="${v[3]}"></td>
                                                    <td class="text-end text-dark font-weight-bold" th:text="'S/ ' + ${#numbers.formatDecimal(v[4], 1, 'POINT', 2, 'COMMA')}"></td>
                                                    <td class="text-center">
                                                        <span th:class="${v[5] == 'REGISTRADA' ? 'badge-status bg-registrada' : 'badge-status bg-anulada'}" 
                                                              th:text="${v[5]}"></span>
                                                    </td>
													<td class="text-center">
													    <a th:href="@{/ventas/verPDF/{id}(id=${v[0]})}" 
													       target="_blank" 
													       style="color: #ff4747; text-decoration: none;">
													        <i class="bi bi-file-earmark-pdf-fill" style="font-size: 1.5rem;"></i>
													    </a>
													</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div> 
            </div> 
        </div> 
    </div> 

    <script th:src="@{/assets/vendors/js/vendor.bundle.base.js}"></script>
    <script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.21/js/dataTables.bootstrap4.min.js"></script>
    
    <script th:inline="none">
        $(document).ready(function() {
            $('#tablaVentasVendedor').DataTable({
                "language": {
                    "lengthMenu": "Mostrar _MENU_ registros",
                    "search": "Buscar:",
                    "info": "Página _PAGE_ de _PAGES_",
                    "paginate": { "next": "Siguiente", "previous": "Anterior" }
                },
                "order": [[ 0, "desc" ]],
                "pageLength": 10,
                "dom": '<"row"<"col-sm-12 col-md-6"l><"col-sm-12 col-md-6"f>>rt<"row"<"col-sm-12 col-md-5"i><"col-sm-12 col-md-7"p>>'
            });
        });
    </script>
</body>
</html>
