<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Historial General | Calzados Morales</title>
    <link rel="stylesheet" th:href="@{/assets/vendors/mdi/css/materialdesignicons.min.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/css/vendor.bundle.base.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="shortcut icon" th:href="@{/assets/images/favicon.png}" />
    
    <style>
        /* CONTROLES SUPERIORES (Basado en image_00e47e.png y image_008204.png) */
        .dataTables_wrapper .row:first-child {
            display: flex;
            align-items: center;
            justify-content: space-between; /* Esquina a esquina */
            margin-bottom: 25px;
            padding: 0; 
        }

        /* "Mostrar registros" a la izquierda */
        .dataTables_length {
            text-align: left;
        }

        .dataTables_length label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            color: #343a40;
            margin-bottom: 0;
        }

        .dataTables_length select {
            width: 70px !important;
            height: 35px !important;
            border: 1px solid #ebedf2;
            border-radius: 4px;
            padding: 5px;
        }

        /* "Buscar" ESQUINADO TOTALMENTE A LA DERECHA */
        .dataTables_filter {
            text-align: right;
            display: flex;
            justify-content: flex-end;
        }

        .dataTables_filter label {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
            font-weight: 500;
            margin-bottom: 0;
        }

        .dataTables_filter input {
            width: 200px !important; /* Tamaño fino y adecuado */
            height: 35px !important;
            border: 1px solid #ebedf2 !important;
            border-radius: 4px !important;
            padding: 5px 12px !important;
            outline: none;
            margin-left: 0 !important; /* Quita margen extra */
        }

        /* PAGINACIÓN ESQUINADA (Basado en image_00dc1f.png) */
        .dataTables_wrapper .row:last-child {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 25px;
        }

        .dataTables_info {
            font-weight: 500;
            color: #6c757d;
            padding-top: 0 !important;
        }

        .pagination {
            justify-content: flex-end !important;
        }

        /* Estilo Morado de Paginación (image_00822c.png) */
        .pagination .page-item.active .page-link {
            background-color: #b66dff !important;
            border-color: #b66dff !important;
            color: white !important;
        }

        .pagination .page-link {
            color: #b66dff !important;
            background-color: #f2edf3;
            border: none;
            margin-left: 5px;
            border-radius: 4px !important;
            padding: 8px 14px;
            font-weight: 500;
        }

        /* Badges de Estado (image_006bc0.png) */
        .badge-status {
            background-color: #1cc88a;
            color: white;
            border-radius: 4px;
            padding: 8px 12px;
            font-weight: bold;
            font-size: 11px;
        }

        .badge-danger-custom {
            background-color: #ff6258;
            color: white;
            border-radius: 4px;
            padding: 8px 12px;
            font-weight: bold;
            font-size: 11px;
        }

        .linea-visible { border-top: 1.5px solid #ebedf2; margin: 20px 0; }
        
        /* Asegurar que la tabla no tenga bordes raros arriba */
        .table { border-top: none !important; }
		
	
		.btn-gradient-success {
		    background: linear-gradient(to right, #11998e, #38ef7d) !important;
		    border: none;
		    color: white;
		}
    </style>
</head>
<body>
    <div class="container-scroller">
        <nav th:replace="~{fragmentos/navbar :: navbar}"></nav>
        
        <div class="container-fluid page-body-wrapper">
            <nav th:replace="~{fragmentos/sidebar :: sidebar}"></nav>

            <div class="main-panel">
                <div class="content-wrapper">
                    
					<div class="page-header">
					    <h3 class="page-title">
					        <span class="page-title-icon bg-gradient-primary text-white me-2">
					            <i class="mdi mdi-history"></i>
					        </span> Historial General de Ventas
					    </h3>
					    <a th:href="@{/ventas/exportar-excel}" class="btn btn-gradient-success btn-icon-text">
					        <i class="mdi mdi-file-excel btn-icon-prepend"></i> Exportar Excel
					    </a>
					</div>

                    <div class="row">
                        <div class="col-12 grid-margin stretch-card">
                            <div class="card shadow-sm">
                                <div class="card-body">
                                    <h4 class="card-title">Listado De Ventas</h4>
                                    <hr class="linea-visible">

                                    <div class="table-responsive">
                                        <table class="table table-hover" id="tablaHistorialAdmin" width="100%">
                                            <thead class="bg-light">
                                                <tr>
                                                    <th>Fecha / Hora</th>
                                                    <th>Vendedor</th>
                                                    <th>Comprobante</th>
                                                    <th>Cliente</th>
                                                    <th class="text-right">Total</th>
                                                    <th class="text-center">Estado</th>
                                                    <th class="text-center">Acciones</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr th:each="v : ${listaHistorial}">
                                                    <td th:text="${v[1]}"></td>
                                                    <td>
                                                        <i class="mdi mdi-account text-primary"></i> 
                                                        <span th:text="${v[2]}"></span>
                                                    </td>
                                                    <td class="font-weight-bold" th:text="${v[4]}"></td>
                                                    <td th:text="${v[3]}"></td>
                                                    <td class="text-right font-weight-bold">
                                                        S/ <span th:text="${#numbers.formatDecimal(v[5], 1, 'POINT', 2, 'COMMA')}"></span>
                                                    </td>
                                                    <td class="text-center">
                                                        <span th:if="${v[6] == 'REGISTRADA'}" class="badge badge-status">REGISTRADA</span>
                                                        <span th:if="${v[6] != 'REGISTRADA'}" class="badge badge-danger-custom">ANULADA</span>
                                                    </td>
													<td class="text-center">
													    <a th:href="@{/ventas/verPDF/{id}(id=${v[0]})}" 
													       target="_blank" 
													       class="btn btn-gradient-dark btn-rounded btn-icon d-inline-flex align-items-center justify-content-center"
													       title="Imprimir Comprobante">
													        <i class="mdi mdi-printer"></i>
													    </a>
													</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div> 

                <footer class="footer">
                    <div class="d-sm-flex justify-content-center justify-content-sm-between">
                        <span class="text-muted">Copyright © 2026 Calzados Morales</span>
                    </div>
                </footer>
            </div> 
        </div> 
    </div> 

    <script th:src="@{/assets/vendors/js/vendor.bundle.base.js}"></script>
    <script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.21/js/dataTables.bootstrap4.min.js"></script>
    
    <script th:inline="none">
        $(document).ready(function() {
            $('#tablaHistorialAdmin').DataTable({
                // Configuración de columnas de Bootstrap para esquinado perfecto
                "dom": '<"row"<"col-sm-12 col-md-6"l><"col-sm-12 col-md-6 text-right"f>>' +
                       '<"row"<"col-sm-12"tr>>' +
                       '<"row"<"col-sm-12 col-md-5"i><"col-sm-12 col-md-7"p>>',
                "language": {
                    "lengthMenu": "Mostrar _MENU_ registros",
                    "search": "Buscar:",
                    "info": "Página _PAGE_ de _PAGES_",
                    "paginate": {
                        "next": "Siguiente",
                        "previous": "Anterior"
                    },
                    "emptyTable": "No se encontraron ventas"
                },
                "order": [[ 0, "desc" ]],
                "pageLength": 10
            });
        });
    </script>
</body>
</html>
