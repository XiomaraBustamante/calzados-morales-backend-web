<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos Estancados | Calzados Morales</title>
    <link rel="stylesheet" th:href="@{/assets/vendors/mdi/css/materialdesignicons.min.css}">
    <link rel="stylesheet" th:href="@{/assets/vendors/css/vendor.bundle.base.css}">
    <link rel="stylesheet" th:href="@{/assets/css/style.css}">
    <link rel="shortcut icon" th:href="@{/assets/images/favicon.png}" />
    <link rel="stylesheet" href="https://cdn.datatables.net/1.10.21/css/dataTables.bootstrap4.min.css">
    
    <style>
        :root {
            --purple-primary: #b66dff;
            --danger-red: #fe7096;
            --border-color: #ebedf2;
        }

        /* 1. ESPACIADO PARA "MOSTRAR" Y "BUSCAR" */
        .dataTables_wrapper .row:first-child {
            margin-bottom: 25px !important;
            align-items: center;
        }

        .dataTables_length label, .dataTables_filter label {
            font-weight: normal;
            color: #343a40;
            font-size: 0.875rem;
            margin-bottom: 0;
        }

        .dataTables_filter {
            text-align: right !important;
        }

        .dataTables_filter input {
            border: 1px solid #ebedf2 !important;
            border-radius: 4px !important;
            padding: 6px 12px !important;
            margin-left: 10px !important;
            width: 200px !important;
        }

        /* 2. CORRECCIÓN DE LA PAGINACIÓN Y VISIBILIDAD DEL NÚMERO 1 */
        .dataTables_wrapper .dataTables_paginate {
            margin-top: 25px !important;
            display: flex;
            justify-content: flex-end;
        }

        .pagination {
            display: flex;
            list-style: none;
            border-radius: 4px;
            overflow: hidden;
            gap: 2px; /* Espacio entre botones */
        }

        .page-item .page-link {
            padding: 8px 16px !important;
            color: #b66dff !important;
            background-color: #f3f0ff !important;
            border: none !important;
            font-weight: 500;
            min-width: 40px;
            text-align: center;
            display: block;
        }

        /* Asegura que el número 1 sea visible con fondo morado al estar activo */
        .page-item.active .page-link {
            background-color: #b66dff !important;
            color: white !important;
            font-weight: bold;
        }

        .page-item.disabled .page-link {
            background-color: #f8f9fa !important;
            color: #b66dff !important;
            opacity: 0.7;
        }

        /* 3. VISIBILIDAD DE "ÚLTIMA SALIDA" Y TABLA */
        .badge-salida {
            background-color: #eeeeee; 
            color: #333333; 
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            display: inline-block;
        }

        .stock-badge {
            background: #f8f9fa;
            color: #333;
            font-weight: 700;
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid #eee;
        }

        .dias-badge { font-weight: 700; font-size: 0.95rem; }
        .alerta-baja { color: #047edf; }
        .alerta-media { color: #ffab2d; }
        .alerta-critica { color: #fe7096; }
    </style>
</head>
<body>
    <div class="container-scroller">
        <nav th:replace="~{fragmentos/navbar :: navbar}"></nav>
        <div class="container-fluid page-body-wrapper">
            <nav th:replace="~{fragmentos/sidebar :: sidebar}"></nav>
            <div class="main-panel">
                <div class="content-wrapper">
                    <div class="page-header">
                        <h3 class="page-title">
                            <span class="page-title-icon bg-gradient-danger text-white me-2">
                                <i class="mdi mdi-package-variant-closed"></i>
                            </span> Productos Estancados
                        </h3>
                    </div>
                    <div class="row">
                        <div class="col-12 grid-margin stretch-card">
                            <div class="card">
                                <div class="card-body">
                                    <h4 class="card-title">Análisis de Inventario</h4>
                                    
                                    <div class="table-responsive">
                                        <table class="table table-hover" id="tablaEstancados" width="100%">
                                            <thead>
                                                <tr>
                                                    <th>Producto</th>
                                                    <th class="text-center">Stock</th>
                                                    <th class="text-center">Precio</th>
                                                    <th class="text-center">Última Salida</th>
                                                    <th class="text-center">Días Estancado</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <tr th:each="p : ${listaEstancados}">
                                                    <td class="py-3">
                                                        <span class="font-weight-bold" th:text="${p[1]}">Nombre</span><br>
                                                        <small class="text-muted" th:text="${p[2]}">Categoría</small>
                                                    </td>
                                                    <td class="text-center"><span class="stock-badge" th:text="${p[3]}">0</span></td>
                                                    <td class="text-center"><span class="text-dark font-weight-bold" th:text="'S/ ' + ${p[4]}">S/ 0.00</span></td>
                                                    <td class="text-center">
                                                        <span class="badge-salida" th:text="${p[5]}">Sin Ventas</span>
                                                    </td>
                                                    <td class="text-center">
                                                        <div th:class="${p[6] >= 120 ? 'dias-badge alerta-critica' : (p[6] >= 60 ? 'dias-badge alerta-media' : 'dias-badge alerta-baja')}">
                                                            <span th:text="${p[6] == 999 ? '∞' : p[6]}">0</span> 
                                                            <small th:if="${p[6] != 999}">días</small>
                                                        </div>
                                                    </td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div> 
            </div> 
        </div> 
    </div> 

    <script th:src="@{/assets/vendors/js/vendor.bundle.base.js}"></script>
    <script src="https://cdn.datatables.net/1.10.21/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.10.21/js/dataTables.bootstrap4.min.js"></script>
    
    <script th:inline="none">
        $(document).ready(function() {
            $('#tablaEstancados').DataTable({
                "language": {
                    "lengthMenu": "Mostrar _MENU_ registros",
                    "search": "Buscar: ",
                    "info": "Página _PAGE_ de _PAGES_",
                    "paginate": { 
                        "next": "Siguiente", 
                        "previous": "Anterior" 
                    }
                },
                "order": [[ 4, "desc" ]], 
                "pageLength": 10,
                "dom": '<"row"<"col-sm-6"l><"col-sm-6 text-right"f>>rt<"row"<"col-sm-6"i><"col-sm-6"p>>'
            });
        });
    </script>
</body>
</html>
